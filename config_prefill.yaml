model:
  model_name: llama3_8B

system:
  gpu_gen: B100
  nvlink_gen: 5
  infiniband_gen: 800
  num_node: 1
  num_device: 4
  processor_type: GPU
  distribution:
    expert_tensor_degree: 1
    none_expert_tensor_degree: 1
  optimization:
    parallel_execution: off
    hetero_subbatch: off
    disagg_system: off
    use_low_unit_moe_only: off
    use_ramulator: off
    compressed_kv: off
    use_absorb: off
    use_flash_mla: off
    use_flash_attention: off
    reuse_kv_cache: off
    kv_cache_reuse_rate: 0.0
    prefill_mode: on
    decode_mode: off

serving:
  max_batch_size: 1
  max_process_token: 0

simulation:
  data: synthesis
  input_len: 16400
  output_len: 1
  precision_byte: 2
  skewness: 0.0
  iter: 1
  injection_rate: 0
  exit_out_of_memory: off
  mem_cap_limit: off

log:
  print_log: on
  export_gantt: off
  output_directory: ./data/
  gantt_directory: ./gantt

nearbank_pim:
  enable_nearbank_model: false
